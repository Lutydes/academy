<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Manager | Gestão de Docentes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark': '#050505',
                        'card': '#0f0f0f',
                        'border': '#1a1a1a',
                        'accent': '#00f3ff',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'mono': ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            padding-bottom: 60px;
        }

        .text-gradient {
            background: linear-gradient(90deg, #fff, #00f3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f3ff; }

        .status-select {
            -webkit-appearance: none;
            appearance: none;
            background-color: #000000;
            border: 2px solid #333;
            padding: 8px;
            border-radius: 6px;
            color: #fff;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .status-select:focus { outline: none; box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .status-select option { background-color: #000000; padding: 5px; font-weight: 600; }
        .status-select option[value="Disponivel"] { color: #0aff00; }
        .status-select option[value="Não Disponivel"] { color: #ff3131; }
        .status-select option[value="Graduação"] { color: #00f3ff; }
        .status-select option[value="Semipresencial"] { color: #ffa500; }
        .status-select option[value="EAD"] { color: #ff00ff; }

        .state-disponivel { border-color: #0aff00; color: #0aff00; background-color: #000; }
        .state-indisponivel { border-color: #ff3131; color: #ff3131; background-color: #000; }
        .state-graduacao { border-color: #00f3ff; color: #00f3ff; background-color: #000; }
        .state-semi { border-color: #ffa500; color: #ffa500; background-color: #000; }
        .state-ead { border-color: #ff00ff; color: #ff00ff; background-color: #000; }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: #00f3ff;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
        }

        .prof-card { transition: transform 0.2s, border-color 0.2s; }
        .prof-card:hover { transform: translateY(-2px); border-color: #00f3ff; }

        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #1a1a1a;
            z-index: 50;
        }
    </style>
</head>
<body class="text-gray-300 font-sans min-h-screen">

    <!-- HEADER -->
    <header class="border-b border-border bg-dark/80 backdrop-blur-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-2 h-8 bg-accent rounded-full shadow-[0_0_10px_#00f3ff]"></div>
                <h1 class="text-2xl font-bold text-gradient tracking-tight">Academy Manager</h1>
            </div>
            
            <div class="relative w-full md:w-96">
                <input type="text" id="searchInput" onkeyup="filterProfessors()" placeholder="Buscar professor ou disciplina..." 
                    class="w-full bg-card border border-border rounded pl-10 pr-4 py-2 text-sm focus:border-accent focus:outline-none">
                <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <button onclick="generateGeneralReport()" class="flex items-center gap-2 bg-card border border-border hover:border-accent text-white px-4 py-2 rounded text-sm transition">
                <span>Relatório Geral</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- FORMULÁRIO -->
        <section class="bg-card border border-border rounded-xl p-6 mb-8 shadow-lg">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-accent rounded-full"></span>
                    <span id="formTitle">Novo Cadastro</span>
                </h2>
                <button id="btnCancelEdit" onclick="resetForm()" class="hidden text-xs text-gray-500 hover:text-red-500 underline">Cancelar Edição</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-6">
                <input type="hidden" id="editId">
                
                <div class="md:col-span-4">
                    <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wider">Nome Completo</label>
                    <input type="text" id="profName" class="w-full bg-dark border border-border rounded px-3 py-2.5 text-white focus:border-accent focus:outline-none" placeholder="Nome do Professor">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wider">Titulação</label>
                    <select id="profTitulacao" class="w-full bg-dark border border-border rounded px-3 py-2.5 text-white focus:border-accent focus:outline-none">
                        <option>Especialista</option>
                        <option>Mestre</option>
                        <option>Doutor</option>
                    </select>
                </div>

                <div class="md:col-span-4">
                    <label class="block text-xs text-gray-500 mb-1 uppercase tracking-wider">Disciplinas de Aderência (Tags)</label>
                    <div class="flex gap-2">
                        <input type="text" id="tagInput" class="flex-1 bg-dark border border-border rounded px-3 py-2.5 text-white focus:border-accent focus:outline-none" placeholder="Digite e aperte enter">
                        <button onclick="addTag()" class="bg-border hover:bg-gray-700 text-white px-4 rounded transition font-bold">+</button>
                    </div>
                    <div id="tagsContainer" class="flex flex-wrap gap-1 mt-2"></div>
                </div>

                <div class="md:col-span-2 flex items-end gap-2">
                    <button id="btnSave" onclick="saveProfessor()" class="flex-1 bg-accent text-black font-bold py-2.5 rounded hover:bg-opacity-80 transition text-sm">Salvar</button>
                    <button id="btnUpdate" onclick="updateProfessor()" class="hidden flex-1 bg-green-500 text-black font-bold py-2.5 rounded hover:bg-opacity-80 transition text-sm">Atualizar</button>
                </div>
            </div>

            <!-- Tabela -->
            <div class="overflow-x-auto rounded border border-border">
                <table class="w-full min-w-[900px] text-xs text-center">
                    <thead>
                        <tr class="bg-dark text-gray-500 uppercase tracking-wider border-b border-border">
                            <th class="p-3 w-20 font-medium">Turno</th>
                            <th class="p-3">Segunda</th>
                            <th class="p-3">Terça</th>
                            <th class="p-3">Quarta</th>
                            <th class="p-3">Quinta</th>
                            <th class="p-3">Sexta</th>
                            <th class="p-3">Sábado</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody"></tbody>
                </table>
            </div>
        </section>

        <!-- LISTA -->
        <section>
            <h2 class="text-xl font-bold text-white mb-6">Corpo Docente</h2>
            <div id="professorList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <p class="text-gray-600 text-center py-10 col-span-full">Carregando dados...</p>
            </div>
        </section>

    </main>

    <!-- RODAPÉ DISCRETO -->
    <footer class="footer-bar py-2 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-xs text-gray-500">
            <span class="hidden md:block">Academy Manager v1.0</span>
            <div class="flex items-center gap-3">
                <span>Atualizado por:</span>
                <select id="authorSelect" class="bg-dark border border-border rounded px-2 py-1 text-white focus:outline-none focus:border-accent">
                    <option value="Osvaldo">Osvaldo</option>
                    <option value="Luis">Luis</option>
                    <option value="Alex">Alex</option>
                </select>
                <span id="footerTimestamp" class="text-gray-600 font-mono"></span>
            </div>
            <span class="hidden md:block opacity-50">Sistema de Uso Interno</span>
        </div>
    </footer>

    <!-- MODAL -->
    <div id="reportModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-50 hidden overflow-y-auto p-4 flex justify-center items-start pt-10">
        <div class="bg-card border border-border rounded-xl max-w-3xl w-full p-6 relative animate-in">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl">&times;</button>
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DO SUPABASE (JÁ PREENCHIDA) ---
        const SUPABASE_URL = 'https://kzpnxhmcqmmhmtstejny.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6cG54aG1jcW1taG10c3Rlam55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMDkzOTAsImV4cCI6MjA4Nzc4NTM5MH0.0gXfc59fY-oWM3SgBEtvMNiOiZKiIkj1sqgFkb3RP3I';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- ESTADO E VARIÁVEIS ---
        const turnos = ['Manhã', 'Tarde', 'Noite'];
        const dias = ['seg', 'ter', 'qua', 'qui', 'sex', 'sab'];
        const statusOpts = ['Disponivel', 'Não Disponivel', 'Graduação', 'Semipresencial', 'EAD'];
        let db = []; 
        let currentTags = [];

        // --- INICIALIZAÇÃO ---
        async function init() {
            renderTable();
            await loadFromSupabase();
            document.getElementById('tagInput').addEventListener('keydown', handleTagInput);
            document.querySelectorAll('.status-select').forEach(s => updateSelectStyle(s));
        }

        // --- FUNÇÕES VISUAIS ---
        function renderTable() {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';
            turnos.forEach(t => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-border';
                const tdLabel = document.createElement('td');
                tdLabel.className = 'p-2 bg-dark font-bold text-accent text-left pl-3';
                tdLabel.innerText = t;
                tr.appendChild(tdLabel);
                dias.forEach(d => {
                    const td = document.createElement('td');
                    td.className = 'p-1';
                    const sel = document.createElement('select');
                    sel.id = `${t.toLowerCase()}-${d}`;
                    sel.className = 'status-select';
                    statusOpts.forEach(opt => {
                        const op = document.createElement('option');
                        op.value = opt; op.innerText = opt;
                        sel.appendChild(op);
                    });
                    sel.onchange = () => updateSelectStyle(sel);
                    td.appendChild(sel);
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function updateSelectStyle(el) {
            el.classList.remove('state-disponivel', 'state-indisponivel', 'state-graduacao', 'state-semi', 'state-ead');
            const val = el.value;
            if(val === 'Disponivel') el.classList.add('state-disponivel');
            else if(val === 'Não Disponivel') el.classList.add('state-indisponivel');
            else if(val === 'Graduação') el.classList.add('state-graduacao');
            else if(val === 'Semipresencial') el.classList.add('state-semi');
            else if(val === 'EAD') el.classList.add('state-ead');
        }

        function handleTagInput(e) { if (e.key === 'Enter') { e.preventDefault(); addTag(); } }
        function addTag() {
            const input = document.getElementById('tagInput');
            const val = input.value.trim();
            if(val && !currentTags.includes(val)) { currentTags.push(val); renderTags(); }
            input.value = ''; input.focus();
        }
        function removeTag(tag) { currentTags = currentTags.filter(t => t !== tag); renderTags(); }
        function renderTags() {
            const c = document.getElementById('tagsContainer'); c.innerHTML = '';
            currentTags.forEach(t => { c.innerHTML += `<span class="tag-pill">${t} <span class="text-red-400 cursor-pointer" onclick="removeTag('${t}')">&times;</span></span>`; });
        }

        // --- BANCO DE DADOS (SUPABASE) ---

        async function loadFromSupabase() {
            const { data, error } = await _supabase
                .from('professores')
                .select('id, nome, titulacao, tags, author, updated_at, disponibilidade(grade)');

            if (error) {
                console.error("Erro ao carregar:", error);
                // Se der erro de política, avisa o usuário
                if(error.message.includes('policy')) {
                    alert("Erro de permissão. Você rodou o script SQL para habilitar RLS?");
                }
                return;
            }
            
            db = data.map(p => ({
                id: p.id,
                nome: p.nome,
                titulacao: p.titulacao,
                tags: p.tags || [],
                author: p.author,
                updatedAt: new Date(p.updated_at).toLocaleString('pt-BR'),
                // Pega a grade dentro do objeto aninhado
                grade: p.disponibilidade && p.disponibilidade.length > 0 ? p.disponibilidade[0].grade : {}
            }));
            renderList();
        }

        async function saveProfessor() {
            const data = collectFormData();
            if(!data) return;

            // 1. Salvar Professor
            const { data: profData, error: err1 } = await _supabase
                .from('professores')
                .insert([{ 
                    nome: data.name, 
                    titulacao: data.tit, 
                    tags: data.tags, 
                    author: data.author, 
                    updated_at: new Date() 
                }])
                .select();

            if(err1) { alert("Erro ao salvar professor: " + err1.message); return; }
            
            const profId = profData[0].id;

            // 2. Salvar Disponibilidade
            const { error: err2 } = await _supabase
                .from('disponibilidade')
                .insert([{ professor_id: profId, grade: data.schedule }]);

            if(err2) { alert("Erro ao salvar grade: " + err2.message); return; }

            alert("Salvo com sucesso!");
            updateFooterTimestamp(data.timestamp);
            resetForm();
            await loadFromSupabase();
        }

        async function editProfessor(id) {
            const prof = db.find(p => p.id === id);
            if(!prof) return;

            document.getElementById('editId').value = id;
            document.getElementById('profName').value = prof.nome;
            document.getElementById('profTitulacao').value = prof.titulacao;
            
            currentTags = prof.tags || [];
            renderTags();

            // Preenche a tabela visual
            turnos.forEach(t => {
                dias.forEach(d => {
                    const el = document.getElementById(`${t.toLowerCase()}-${d}`);
                    // Busca o valor dentro do objeto grade, padrão 'Disponivel' se vazio
                    const val = prof.grade && prof.grade[t.toLowerCase()] ? prof.grade[t.toLowerCase()][d] : 'Disponivel';
                    el.value = val;
                    updateSelectStyle(el);
                });
            });

            document.getElementById('formTitle').innerText = "Editando: " + prof.nome;
            document.getElementById('btnSave').classList.add('hidden');
            document.getElementById('btnUpdate').classList.remove('hidden');
            document.getElementById('btnCancelEdit').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function updateProfessor() {
            const id = document.getElementById('editId').value;
            const data = collectFormData();
            if(!data) return;

            // 1. Atualizar Professor
            const { error: err1 } = await _supabase
                .from('professores')
                .update({ 
                    nome: data.name, 
                    titulacao: data.tit, 
                    tags: data.tags, 
                    author: data.author, 
                    updated_at: new Date() 
                })
                .eq('id', id);

            if(err1) { alert("Erro ao atualizar professor"); return; }

            // 2. Atualizar Disponibilidade
            // Na lógica SQL, deletamos a antiga e inserimos nova para simplificar, 
            // ou atualizamos se soubermos o ID da tabela disponibilidade.
            // Forma simples: Deleta tudo desse professor e reinsere.
            await _supabase.from('disponibilidade').delete().match({ professor_id: id });
            
            const { error: err2 } = await _supabase
                .from('disponibilidade')
                .insert([{ professor_id: id, grade: data.schedule }]);

            if(err2) { alert("Erro ao atualizar grade"); return; }

            alert("Atualizado!");
            updateFooterTimestamp(data.timestamp);
            resetForm();
            await loadFromSupabase();
        }

        async function deleteProfessor(id) {
            if(confirm("Excluir este professor?")) {
                // O CASCADE no SQL vai apagar a disponibilidade automaticamente
                await _supabase.from('professores').delete().match({ id: id });
                await loadFromSupabase();
            }
        }

        // --- AUXILIARES ---
        function collectFormData() {
            const name = document.getElementById('profName').value.trim();
            const tit = document.getElementById('profTitulacao').value;
            if(!name) { alert('Nome obrigatório'); return null; }

            const schedule = {};
            turnos.forEach(t => {
                schedule[t.toLowerCase()] = {};
                dias.forEach(d => {
                    schedule[t.toLowerCase()][d] = document.getElementById(`${t.toLowerCase()}-${d}`).value;
                });
            });

            const author = document.getElementById('authorSelect').value;
            const timestamp = new Date().toLocaleString('pt-BR');

            return { name, tit, schedule, tags: [...currentTags], author, timestamp };
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('profName').value = '';
            document.getElementById('profTitulacao').selectedIndex = 0;
            currentTags = [];
            renderTags();
            document.getElementById('formTitle').innerText = "Novo Cadastro";
            document.getElementById('btnSave').classList.remove('hidden');
            document.getElementById('btnUpdate').classList.add('hidden');
            document.getElementById('btnCancelEdit').classList.add('hidden');
            
            document.querySelectorAll('.status-select').forEach(s => {
                s.value = 'Disponivel';
                updateSelectStyle(s);
            });
        }

        function updateFooterTimestamp(text) {
            const el = document.getElementById('footerTimestamp');
            el.innerText = text;
            el.classList.add('text-accent');
            setTimeout(() => el.classList.remove('text-accent'), 2000);
        }

        // --- RENDERIZAÇÃO DA LISTA ---
        function renderList() {
            const list = document.getElementById('professorList');
            if(db.length === 0) {
                list.innerHTML = '<p class="text-gray-600 col-span-full text-center py-10">Nenhum professor cadastrado.</p>';
                return;
            }

            list.innerHTML = '';
            db.forEach(p => {
                const tagsHtml = p.tags && p.tags.length > 0 
                    ? p.tags.map(t => `<span class="tag-pill text-[10px]">${t}</span>`).join('') 
                    : '<span class="text-gray-700 text-[10px]">Sem tags</span>';

                const card = document.createElement('div');
                card.className = 'prof-card bg-card border border-border rounded-lg p-5 cursor-pointer group';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-semibold text-white group-hover:text-accent transition">${p.nome}</h3>
                            <span class="text-xs text-gray-500 uppercase tracking-wider">${p.titulacao}</span>
                        </div>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="event.stopPropagation(); deleteProfessor('${p.id}')" class="text-red-500 hover:text-red-400 text-xs">Excluir</button>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1 mb-4 min-h-[24px]">
                        ${tagsHtml}
                    </div>
                    <div class="border-t border-border pt-3 flex justify-between items-center text-[10px] text-gray-600">
                        <span>Por: ${p.author || 'N/A'} em ${p.updatedAt || 'N/A'}</span>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); generateIndividualReport('${p.id}')" class="text-accent hover:underline">Ver Grade</button>
                            <button onclick="event.stopPropagation(); editProfessor('${p.id}')" class="bg-dark px-2 py-1 rounded border border-border hover:border-accent">Editar</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function filterProfessors() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.prof-card');
            
            cards.forEach(card => {
                const name = card.querySelector('h3').innerText.toLowerCase();
                const tags = card.querySelector('.flex-wrap').innerText.toLowerCase();
                
                if(name.includes(term) || tags.includes(term)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // --- RELATÓRIOS ---
        function generateIndividualReport(id) {
            const p = db.find(prof => prof.id === id);
            if(!p) return;

            const content = document.getElementById('reportContent');
            let tableRows = '';
            
            turnos.forEach(t => {
                let cells = '';
                dias.forEach(d => {
                    const val = p.grade && p.grade[t.toLowerCase()] ? p.grade[t.toLowerCase()][d] : 'N/A';
                    let colorClass = 'text-gray-400';
                    if(val === 'Disponivel') colorClass = 'text-green-400 font-bold';
                    if(val === 'Não Disponivel') colorClass = 'text-red-400';
                    if(val === 'Graduação') colorClass = 'text-cyan-400';
                    if(val === 'Semipresencial') colorClass = 'text-orange-400';
                    if(val === 'EAD') colorClass = 'text-pink-400';
                    
                    cells += `<td class="p-2 border border-border ${colorClass}">${val}</td>`;
                });
                tableRows += `<tr class="border-b border-border"><td class="p-2 font-bold text-accent border border-border">${t}</td>${cells}</tr>`;
            });

            content.innerHTML = `
                <h2 class="text-2xl font-bold text-white mb-1">${p.nome}</h2>
                <p class="text-accent text-sm mb-1">${p.titulacao} | Tags: ${p.tags.join(', ')}</p>
                <p class="text-gray-500 text-xs mb-6">Última atualização: ${p.updatedAt} por ${p.author}</p>
                <table class="w-full text-xs text-center border-collapse">
                    <thead>
                        <tr class="bg-dark">
                            <th class="p-2 border border-border text-gray-500"></th>
                            ${dias.map(d => `<th class="p-2 border border-border text-gray-500 uppercase">${d}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                </table>
            `;

            document.getElementById('reportModal').classList.remove('hidden');
        }

        function generateGeneralReport() {
            if(db.length === 0) { alert("Sem dados"); return; }
            const content = document.getElementById('reportContent');
            let html = '<h2 class="text-2xl font-bold text-white mb-6">Relatório Geral</h2>';
            db.forEach(p => {
                html += `<div class="mb-6 border-b border-border pb-4">
                    <h3 class="text-lg font-semibold">${p.nome} <span class="text-xs text-gray-500 font-normal">(${p.titulacao})</span></h3>
                    <div class="text-xs text-gray-400 my-1">Disciplinas: ${p.tags.join(', ')}</div>
                    <div class="text-xs text-gray-600">Atualizado por: ${p.author} em ${p.updatedAt}</div>
                </div>`;
            });
            content.innerHTML = html;
            document.getElementById('reportModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('reportModal').classList.add('hidden'); }

        // Iniciar a aplicação
        init();

    </script>
</body>
</html>
